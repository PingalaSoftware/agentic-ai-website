# Deploy AgenticAI to GitHub Pages (same pattern as LedgerPay)
# Push to main → build Next.js static export → deploy to gh-pages branch
# Configure Pages in repo Settings → Pages → Source: GitHub Actions
# Optional: add AgenticAI/public/CNAME with your domain (e.g. agenticaishow.in) for custom domain

name: Deploy AgenticAI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "AgenticAI/**"
      - ".github/workflows/deploy-agenticai.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-agenticai"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: AgenticAI/package-lock.json

      - name: Install dependencies
        working-directory: AgenticAI
        run: npm ci

      - name: Build (static export)
        working-directory: AgenticAI
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: AgenticAI/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
